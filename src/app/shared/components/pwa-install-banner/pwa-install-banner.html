@if (showBanner()) {
  <div
    class="install-banner flex flex-wrap items-center justify-between gap-2 rounded-lg border border-gray-200 bg-white p-3 shadow-md dark:border-gray-700 dark:bg-gray-900"
    role="status"
  >
    <p class="text-sm">
      Install Habit Tracker for quick access from your home screen.
    </p>
    <div class="flex gap-2">
      <button type="button" matButton="filled" (click)="install()">
        Install
      </button>
      <button type="button" matButton="outlined" (click)="dismiss()">
        Not now
      </button>
    </div>
  </div>
}
